services:
  - type: web
    name: campuscortex-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GUARDIAN_API_KEY
        sync: false
      - key: NEWSDATA_API_KEY
        sync: false
      - key: GMAIL_SENDER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
    healthCheckPath: /health

  - type: static
    name: campuscortex-frontend
    rootDir: frontend/ai-lumina-vision
    buildCommand: npm install && npm run build
    staticPublishPath: dist/client
    envVars:
      - key: VITE_API_BASE_URL
        value: https://campuscortexai.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
